# nginx reverse proxy + HTTPS (Certbot / Let's Encrypt)
# Place at /etc/nginx/sites-available/porterlike
# Then: ln -s /etc/nginx/sites-available/porterlike /etc/nginx/sites-enabled/
#
# Prerequisites:
#   apt install nginx certbot python3-certbot-nginx
#   Replace YOUR_DOMAIN below with your actual domain (e.g. api.myapp.com)
#   Then run: certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Certbot will automatically upgrade this to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # Certbot fills these in automatically
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;

    # WebSocket support (tracking-service uses STOMP/WS)
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Forward real client IP to the gateway
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Increase timeouts for long-lived WS connections
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;

    location / {
        proxy_pass http://127.0.0.1:8080;
    }
}

# Required for WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
