services:
  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD_FILE: /run/secrets/auth_db_password
    ports:
      - "5433:5432"
    secrets:
      - auth_db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-booking:
    image: postgres:16
    container_name: postgres-booking
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD_FILE: /run/secrets/booking_db_password
    ports:
      - "5434:5432"
    secrets:
      - booking_db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d booking_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-driver:
    image: postgres:16
    container_name: postgres-driver
    restart: unless-stopped
    environment:
      POSTGRES_DB: driver_db
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD_FILE: /run/secrets/driver_db_password
    ports:
      - "5435:5432"
    secrets:
      - driver_db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d driver_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-rating:
    image: postgres:16
    container_name: postgres-rating
    restart: unless-stopped
    environment:
      POSTGRES_DB: rating_db
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD_FILE: /run/secrets/rating_db_password
    ports:
      - "5436:5432"
    secrets:
      - rating_db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d rating_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-analytics:
    image: postgres:16
    container_name: postgres-analytics
    restart: unless-stopped
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD_FILE: /run/secrets/analytics_db_password
    ports:
      - "5437:5432"
    secrets:
      - analytics_db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d analytics_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-fraud:
    image: postgres:16
    container_name: postgres-fraud
    restart: unless-stopped
    environment:
      POSTGRES_DB: fraud_db
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD_FILE: /run/secrets/fraud_db_password
    ports:
      - "5438:5432"
    secrets:
      - fraud_db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d fraud_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: logistics-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: logistics-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: logistics-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 15

  discovery-service:
    build:
      context: .
      dockerfile: platform/discovery-service/Dockerfile
    container_name: discovery-service
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    environment:
      AUTH_DB_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      AUTH_DB_USER: logistics
      APP_SECRET_PATH: /run/secrets/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      postgres-auth:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    secrets:
      - auth_db_password
      - jwt_secret
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: booking-service
    restart: unless-stopped
    environment:
      BOOKING_DB_URL: jdbc:postgresql://postgres-booking:5432/booking_db
      BOOKING_DB_USER: logistics
      APP_SECRET_PATH: /run/secrets/
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      postgres-booking:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      driver-service:
        condition: service_healthy
    secrets:
      - booking_db_password
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  driver-service:
    build:
      context: .
      dockerfile: services/driver-service/Dockerfile
    restart: unless-stopped
    environment:
      DRIVER_DB_URL: jdbc:postgresql://postgres-driver:5432/driver_db
      DRIVER_DB_USER: logistics
      APP_SECRET_PATH: /run/secrets/
      REDIS_HOST: redis
      APP_TRACKING_ENDPOINT: http://tracking-service:8085/tracking/location
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      postgres-driver:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      tracking-service:
        condition: service_healthy
    secrets:
      - driver_db_password
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  tracking-service:
    build:
      context: .
      dockerfile: services/tracking-service/Dockerfile
    container_name: tracking-service
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  pricing-service:
    build:
      context: .
      dockerfile: services/pricing-service/Dockerfile
    container_name: pricing-service
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    container_name: admin-service
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8087/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  matching-service:
    build:
      context: .
      dockerfile: services/matching-service/Dockerfile
    container_name: matching-service
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8089/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  rating-service:
    build:
      context: .
      dockerfile: services/rating-service/Dockerfile
    container_name: rating-service
    restart: unless-stopped
    environment:
      RATING_DB_URL: jdbc:postgresql://postgres-rating:5432/rating_db
      RATING_DB_USER: logistics
      APP_SECRET_PATH: /run/secrets/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      postgres-rating:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    secrets:
      - rating_db_password
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8090/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: analytics-service
    restart: unless-stopped
    environment:
      ANALYTICS_DB_URL: jdbc:postgresql://postgres-analytics:5432/analytics_db
      ANALYTICS_DB_USER: logistics
      APP_SECRET_PATH: /run/secrets/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      postgres-analytics:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    secrets:
      - analytics_db_password
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8091/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  fraud-detection-service:
    build:
      context: .
      dockerfile: services/fraud-detection-service/Dockerfile
    container_name: fraud-detection-service
    restart: unless-stopped
    environment:
      FRAUD_DB_URL: jdbc:postgresql://postgres-fraud:5432/fraud_db
      FRAUD_DB_USER: logistics
      APP_SECRET_PATH: /run/secrets/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      postgres-fraud:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    secrets:
      - fraud_db_password
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8092/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
  api-gateway:
    build:
      context: .
      dockerfile: platform/api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    environment:
      APP_SECRET_PATH: /run/secrets/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      driver-service:
        condition: service_healthy
      tracking-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      pricing-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      matching-service:
        condition: service_healthy
      rating-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      fraud-detection-service:
        condition: service_healthy
    secrets:
      - jwt_secret
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

secrets:
  auth_db_password:
    file: ./secrets/local/auth_db_password
  booking_db_password:
    file: ./secrets/local/booking_db_password
  driver_db_password:
    file: ./secrets/local/driver_db_password
  rating_db_password:
    file: ./secrets/local/rating_db_password
  analytics_db_password:
    file: ./secrets/local/analytics_db_password
  fraud_db_password:
    file: ./secrets/local/fraud_db_password
  jwt_secret:
    file: ./secrets/local/jwt_secret
