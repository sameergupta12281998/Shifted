services:
  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD_FILE: /run/secrets/auth_db_password
    ports:
      - "5433:5432"
    secrets:
      - auth_db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-booking:
    image: postgres:16
    container_name: postgres-booking
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD_FILE: /run/secrets/booking_db_password
    ports:
      - "5434:5432"
    secrets:
      - booking_db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d booking_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-driver:
    image: postgres:16
    container_name: postgres-driver
    restart: unless-stopped
    environment:
      POSTGRES_DB: driver_db
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD_FILE: /run/secrets/driver_db_password
    ports:
      - "5435:5432"
    secrets:
      - driver_db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d driver_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: logistics-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-service:
    build:
      context: .
      dockerfile: platform/discovery-service/Dockerfile
    container_name: discovery-service
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    environment:
      AUTH_DB_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      AUTH_DB_USER: logistics
      APP_SECRET_PATH: /run/secrets/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      postgres-auth:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    secrets:
      - auth_db_password
      - jwt_secret
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: booking-service
    restart: unless-stopped
    environment:
      BOOKING_DB_URL: jdbc:postgresql://postgres-booking:5432/booking_db
      BOOKING_DB_USER: logistics
      APP_SECRET_PATH: /run/secrets/
      REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      postgres-booking:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      driver-service:
        condition: service_healthy
    secrets:
      - booking_db_password
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  driver-service:
    build:
      context: .
      dockerfile: services/driver-service/Dockerfile
    restart: unless-stopped
    environment:
      DRIVER_DB_URL: jdbc:postgresql://postgres-driver:5432/driver_db
      DRIVER_DB_USER: logistics
      APP_SECRET_PATH: /run/secrets/
      REDIS_HOST: redis
      APP_TRACKING_ENDPOINT: http://tracking-service:8085/tracking/location
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      postgres-driver:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      tracking-service:
        condition: service_healthy
    secrets:
      - driver_db_password
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  tracking-service:
    build:
      context: .
      dockerfile: services/tracking-service/Dockerfile
    container_name: tracking-service
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  pricing-service:
    build:
      context: .
      dockerfile: services/pricing-service/Dockerfile
    container_name: pricing-service
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    container_name: admin-service
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8087/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
  api-gateway:
    build:
      context: .
      dockerfile: platform/api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    environment:
      APP_SECRET_PATH: /run/secrets/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      driver-service:
        condition: service_healthy
      tracking-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      pricing-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    secrets:
      - jwt_secret
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

secrets:
  auth_db_password:
    file: ./secrets/local/auth_db_password
  booking_db_password:
    file: ./secrets/local/booking_db_password
  driver_db_password:
    file: ./secrets/local/driver_db_password
  jwt_secret:
    file: ./secrets/local/jwt_secret
