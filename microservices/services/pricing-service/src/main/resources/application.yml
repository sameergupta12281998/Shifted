server:
  port: 8086
  shutdown: graceful
spring:
  application:
    name: pricing-service
  lifecycle:
    timeout-per-shutdown-phase: 20s

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  pricing:
    currency: INR
    bike:
      base-fare: ${PRICING_BIKE_BASE_FARE:40}
      per-km: ${PRICING_BIKE_PER_KM:12}
      per-minute: ${PRICING_BIKE_PER_MINUTE:1}
    mini-truck:
      base-fare: ${PRICING_MINI_TRUCK_BASE_FARE:80}
      per-km: ${PRICING_MINI_TRUCK_PER_KM:20}
      per-minute: ${PRICING_MINI_TRUCK_PER_MINUTE:2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
