server:
  port: 8083
  shutdown: graceful
spring:
  config:
    import: optional:configtree:${APP_SECRET_PATH:/run/secrets/}
  application:
    name: driver-service
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${DRIVER_DB_URL:jdbc:postgresql://localhost:5435/driver_db}
    username: ${DRIVER_DB_USER:logistics}
    password: ${driver_db_password:${DRIVER_DB_PASSWORD:logistics}}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  tracking:
    endpoint: http://tracking-service/tracking/location
    internal-service-token: ${INTERNAL_SERVICE_TOKEN:shifted-internal-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
