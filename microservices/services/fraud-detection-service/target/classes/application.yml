server:
  port: 8092
  shutdown: graceful

spring:
  config:
    import: optional:configtree:${APP_SECRET_PATH:/run/secrets/}
  application:
    name: fraud-detection-service
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${FRAUD_DB_URL:jdbc:postgresql://localhost:5438/fraud_db}
    username: ${FRAUD_DB_USER:logistics}
    password: ${fraud_db_password:${FRAUD_DB_PASSWORD:logistics}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: fraud-detection-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  fraud:
    max-bookings-per-hour: ${FRAUD_MAX_BOOKINGS_PER_HOUR:10}
    max-payment-amount: ${FRAUD_MAX_PAYMENT_AMOUNT:50000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
