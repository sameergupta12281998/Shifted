server:
  port: 8090
  shutdown: graceful

spring:
  config:
    import: optional:configtree:${APP_SECRET_PATH:/run/secrets/}
  application:
    name: rating-service
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${RATING_DB_URL:jdbc:postgresql://localhost:5436/rating_db}
    username: ${RATING_DB_USER:logistics}
    password: ${rating_db_password:${RATING_DB_PASSWORD:logistics}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
