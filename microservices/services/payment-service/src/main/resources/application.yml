server:
  port: 8088
  shutdown: graceful
spring:
  application:
    name: payment-service
  lifecycle:
    timeout-per-shutdown-phase: 20s

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  payment:
    provider: ${PAYMENT_PROVIDER:stub}
    currency: ${PAYMENT_CURRENCY:INR}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
