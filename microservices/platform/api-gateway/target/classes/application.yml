server:
  port: 8080
  shutdown: graceful
spring:
  config:
    import: optional:configtree:${APP_SECRET_PATH:/run/secrets/}
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 20s
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/booking/**
        - id: driver-service
          uri: lb://driver-service
          predicates:
            - Path=/driver/**
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**
        - id: tracking-service
          uri: lb://tracking-service
          predicates:
            - Path=/tracking/**
        - id: pricing-service
          uri: lb://pricing-service
          predicates:
            - Path=/pricing/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payments/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

security:
  jwt:
    secret: ${JWT_SECRET:${jwt_secret:local-dev-jwt-secret-change-me-32bytes-minimum}}
  rate-limit:
    general-per-minute: ${RATE_LIMIT_GENERAL_PER_MINUTE:120}
    auth-per-minute: ${RATE_LIMIT_AUTH_PER_MINUTE:20}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
